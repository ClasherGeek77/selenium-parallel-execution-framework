name: Selenium UI Parallel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-xdist selenium webdriver-manager
        if [ -f requirements.pip ]; then pip install -r requirements.pip; fi
        
    - name: Run Pytest in Parallel
      run: |
        # Run 4 workers in parallel as emulated by the parameterized tests
        pytest web_tests/test_parallel.py -n 4 -v
